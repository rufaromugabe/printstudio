# Production overlay: natives, JWT auth, ICC + approval gates.
# Uses the same .env S3/R2 keys as compose.yaml.
services:
  api:
    env_file: .env
    environment:
      AUTH_MODE: jwt
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?set GOOGLE_CLIENT_ID}
      WEB_ORIGIN: ${WEB_ORIGIN:-https://studio.example.com}
      VIPS_BIN: ${VIPS_BIN:-vips}
      POTRACE_BIN: ${POTRACE_BIN:-potrace}
      ICC_PROFILE_DIR: /var/printstudio/icc
      REQUIRE_PRODUCTION_NATIVES: "true"
      REQUIRE_PRODUCTION_APPROVAL: "true"
      REQUIRE_ICC: "true"
      S3_ENDPOINT: ${S3_ENDPOINT:?set S3_ENDPOINT}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:?set S3_PUBLIC_ENDPOINT}
      S3_REGION: ${S3_REGION:-auto}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?set S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-printstudio-assets}
    volumes:
      - icc_profiles:/var/printstudio/icc
  web:
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.example.com}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}

volumes:
  icc_profiles:
