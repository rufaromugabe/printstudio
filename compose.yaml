services:
  web:
    build: .
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      api:
        condition: service_healthy
  api:
    build: ./services/api
    ports: ["8080:8080"]
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://printstudio:printstudio@postgres:5432/printstudio?sslmode=disable
      AUTH_MODE: dev
      WEB_ORIGIN: http://localhost:3000
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: printstudio
      S3_SECRET_KEY: printstudio-secret
      S3_BUCKET: printstudio-assets
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/api", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 5
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: printstudio
      POSTGRES_PASSWORD: printstudio
      POSTGRES_DB: printstudio
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U printstudio"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:8-alpine
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: printstudio
      MINIO_ROOT_PASSWORD: printstudio-secret
    volumes: ["minio_data:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  postgres_data:
  minio_data:
