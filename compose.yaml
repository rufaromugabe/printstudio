services:
  web:
    build: .
    ports: ["3000:3000"]
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    depends_on:
      api:
        condition: service_healthy
  api:
    build: ./services/api
    ports: ["8080:8080"]
    env_file: .env
    environment:
      PORT: "8080"
      # Compose network hostname (overrides localhost from .env)
      DATABASE_URL: postgres://printstudio:printstudio@postgres:5432/printstudio?sslmode=disable
      AUTH_MODE: ${AUTH_MODE:-dev}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      S3_ENDPOINT: ${S3_ENDPOINT:?set S3_ENDPOINT in .env}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:?set S3_PUBLIC_ENDPOINT in .env}
      S3_REGION: ${S3_REGION:-auto}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY in .env}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?set S3_SECRET_KEY in .env}
      S3_BUCKET: ${S3_BUCKET:-printstudio-assets}
      VIPS_BIN: ${VIPS_BIN:-vips}
      POTRACE_BIN: ${POTRACE_BIN:-potrace}
      ICC_PROFILE_DIR: ${ICC_PROFILE_DIR:-/var/printstudio/icc}
      REQUIRE_PRODUCTION_NATIVES: ${REQUIRE_PRODUCTION_NATIVES:-false}
      REQUIRE_PRODUCTION_APPROVAL: ${REQUIRE_PRODUCTION_APPROVAL:-false}
      REQUIRE_ICC: ${REQUIRE_ICC:-false}
      MAX_RENDER_PIXELS: ${MAX_RENDER_PIXELS:-100000000}
    volumes:
      - icc_data:/var/printstudio/icc
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/api", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 5
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: printstudio
      POSTGRES_PASSWORD: printstudio
      POSTGRES_DB: printstudio
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U printstudio"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:8-alpine
volumes:
  postgres_data:
  icc_data:
